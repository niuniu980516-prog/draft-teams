<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>翻牌抽籤分隊</title>
<style>
  * { box-sizing:border-box; }
  body { font-family: "Microsoft JhengHei", sans-serif; background:#1b1f2a; color:#eee; text-align:center; padding:16px; max-width:520px; margin:0 auto; }
  h1 { margin-bottom:10px; font-size:22px; }
  .info { color:#ccc; margin-bottom:16px; font-size:15px; min-height:40px; line-height:1.4; }
  button { padding:14px 20px; margin:6px; font-size:17px; border:none; border-radius:8px; cursor:pointer; background:#3a7bd5; color:#fff; touch-action:manipulation; }
  button:disabled { background:#444; color:#888; cursor:not-allowed; }

  .setupBox { background:#242938; border-radius:12px; padding:16px; max-width:420px; margin:0 auto 20px; }
  .setupBox h3 { margin-top:0; font-size:16px; }
  .setupRow { display:flex; justify-content:space-between; align-items:center; margin:14px 0; font-size:17px; }
  .setupRow .stepper { display:flex; align-items:center; gap:8px; }
  .setupRow .stepBtn {
    width:44px; height:44px; font-size:22px; font-weight:bold; border-radius:8px; border:none;
    background:#3a4257; color:#fff; cursor:pointer; touch-action:manipulation; margin:0; padding:0;
    display:flex; align-items:center; justify-content:center; line-height:1;
  }
  .setupRow .stepBtn:active { background:#4c5670; }
  .setupRow .stepBtn:disabled { background:#2b3040; color:#666; cursor:not-allowed; }
  .setupRow input { width:48px; font-size:18px; padding:8px 2px; border-radius:6px; border:1px solid #555; background:#1b1f2a; color:#eee; text-align:center; -moz-appearance:textfield; }
  .setupRow input::-webkit-outer-spin-button, .setupRow input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .setupRow.blue label { color:#5a91ff; }
  .setupRow.red label { color:#ff6f6a; }
  .setupRow.white label { color:#eee; }
  .setupHint { color:#999; font-size:13px; margin-top:8px; }
  .setupTotal { color:#ffd166; font-size:14px; margin-top:10px; }

  .pickBar { display:flex; justify-content:center; gap:10px; margin:14px 0 20px; flex-wrap:wrap; }
  .pickBtn {
    padding:12px 18px; font-size:16px; font-weight:bold; border-radius:10px; border:3px solid transparent;
    cursor:pointer; color:#fff; flex:1 1 90px; min-width:90px; max-width:140px;
  }
  .pickBtn.blue { background:#2b6cff; }
  .pickBtn.red { background:#e0433f; }
  .pickBtn.white { background:#eee; color:#222; }
  .pickBtn.selected { border-color:#ffd166; box-shadow:0 0 12px #ffd166; transform:scale(1.06); }
  .pickBtn:disabled { background:#555 !important; color:#999 !important; opacity:0.5; box-shadow:none; }

  .cards { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-top:10px; max-width:420px; margin-left:auto; margin-right:auto; }
  .card {
    width:100%; aspect-ratio:3/4; border-radius:10px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:bold; user-select:none;
    background:#2b3040; border:2px solid #444; transition: transform 0.15s;
  }
  .card:hover:not(.disabled) { transform: scale(1.05); border-color:#ffd166; }
  .card.disabled { cursor:not-allowed; opacity:0.35; }
  .card.flipped.blue { background:#2b6cff; border-color:#5a91ff; }
  .card.flipped.red { background:#e0433f; border-color:#ff6f6a; }
  .card.flipped.white { background:#eeeeee; color:#222; border-color:#fff; }

  .teams { display:flex; justify-content:center; gap:16px; margin-top:26px; flex-wrap:wrap; }
  .team { min-width:100px; flex:1 1 100px; }
  .team h3 { margin-bottom:6px; font-size:15px; }
  .team.blue h3 { color:#5a91ff; }
  .team.red h3 { color:#ff6f6a; }
  .team.white h3 { color:#eee; }
  .team ul { list-style:none; padding:0; font-size:13px; }
  .team li { padding:3px 0; }

  .hidden { display:none; }

  @media (min-width: 480px) {
    .cards { grid-template-columns:repeat(4, 1fr); }
  }

  .navBar { display:flex; gap:8px; justify-content:center; margin-bottom:16px; }
  .navBtn { flex:1 1 auto; max-width:200px; padding:12px; font-size:15px; background:#2b3040; border:2px solid transparent; }
  .navBtn.active { background:#3a7bd5; border-color:#ffd166; }

  .scoreWrap { max-width:460px; margin:0 auto; }
  .nameRow { display:flex; gap:10px; margin-bottom:14px; }
  .nameRow input { flex:1; font-size:16px; padding:10px; border-radius:8px; border:1px solid #555; background:#242938; color:#eee; text-align:center; }
  .setInfo { color:#ffd166; font-size:15px; margin-bottom:10px; }
  .scoreBoard { display:flex; gap:12px; align-items:stretch; }
  .scoreCol { flex:1; background:#242938; border-radius:14px; padding:14px 8px; display:flex; flex-direction:column; align-items:center; position:relative; }
  .scoreCol.serving { box-shadow:0 0 0 3px #ffd166 inset; }
  .serveDot { width:16px; height:16px; border-radius:50%; background:#ffd166; margin-bottom:10px; visibility:hidden; }
  .scoreCol.serving .serveDot { visibility:visible; }
  .bigScore { font-size:140px; font-weight:900; line-height:1; margin:4px 0 18px; }
  @media (min-width:420px) { .bigScore { font-size:180px; } }
  .scoreBtns { display:flex; gap:8px; }
  .scoreBtns button { width:52px; height:52px; font-size:22px; margin:0; padding:0; }
  .scoreBtns .minusBtn { background:#5a2020; }
  .matchControls { display:flex; justify-content:center; gap:10px; margin-top:20px; flex-wrap:wrap; }
  .setHistory { text-align:center; color:#999; font-size:13px; margin-top:14px; }
  .winnerBanner { text-align:center; font-size:32px; color:#ffd166; font-weight:bold; margin:16px 0; }
  .modeRow { display:flex; justify-content:center; gap:10px; margin-bottom:12px; }
  .modeBtn { background:#2b3040; border:2px solid transparent; padding:10px 18px; font-size:15px; }
  .modeBtn.active { background:#3a7bd5; border-color:#ffd166; }
</style>
</head>
<body>

<h1>翻牌抽籤 / 排球記分板</h1>

<div class="navBar">
  <button class="navBtn active" id="navDraft">🎴 抽籤分隊</button>
  <button class="navBtn" id="navScore">🏐 排球記分板</button>
</div>

<div id="draftPage">

<div class="setupBox" id="setupBox">
  <h3>第一次抽籤設定（每色最多 6 名）</h3>
  <div class="setupRow blue">
    <label>藍隊</label>
    <div class="stepper">
      <button type="button" class="stepBtn" data-color="blue" data-delta="-1">－</button>
      <input type="number" id="setBlue" min="0" max="6" value="6" readonly>
      <button type="button" class="stepBtn" data-color="blue" data-delta="1">＋</button>
    </div>
  </div>
  <div class="setupRow red">
    <label>紅隊</label>
    <div class="stepper">
      <button type="button" class="stepBtn" data-color="red" data-delta="-1">－</button>
      <input type="number" id="setRed" min="0" max="6" value="6" readonly>
      <button type="button" class="stepBtn" data-color="red" data-delta="1">＋</button>
    </div>
  </div>
  <div class="setupRow white">
    <label>白隊</label>
    <div class="stepper">
      <button type="button" class="stepBtn" data-color="white" data-delta="-1">－</button>
      <input type="number" id="setWhite" min="0" max="6" value="6" readonly>
      <button type="button" class="stepBtn" data-color="white" data-delta="1">＋</button>
    </div>
  </div>
  <div class="setupHint">第二次會自動補齊每隊到 6 名，只顯示剩餘要抽的牌</div>
  <div class="setupTotal" id="setupTotal"></div>
  <button id="btnStart">開始抽籤</button>
</div>

<div id="gameArea" class="hidden">
  <div class="info" id="statusText"></div>

  <div class="pickBar" id="pickBar">
    <button class="pickBtn blue" data-color="blue" id="pickBlue">藍</button>
    <button class="pickBtn red" data-color="red" id="pickRed">紅</button>
    <button class="pickBtn white" data-color="white" id="pickWhite">白</button>
  </div>

  <div class="cards" id="cardArea"></div>

  <div>
    <button id="btnReset">重新開始</button>
  </div>

  <div class="teams">
    <div class="team blue"><h3>藍隊 (0/6)</h3><ul id="listBlue"></ul></div>
    <div class="team red"><h3>紅隊 (0/6)</h3><ul id="listRed"></ul></div>
    <div class="team white"><h3>白隊 (0/6)</h3><ul id="listWhite"></ul></div>
  </div>
</div>

</div>

<div id="scorePage" class="hidden">
  <div class="scoreWrap">
    <div class="modeRow" id="modeRow">
      <button class="modeBtn active" id="mode25" data-cap="25">25 分制</button>
      <button class="modeBtn" id="mode15" data-cap="15">15 分制</button>
    </div>
    <div class="setInfo" id="setInfo">25 分制</div>
    <div id="winnerBanner" class="winnerBanner hidden"></div>
    <div class="scoreBoard">
      <div class="scoreCol" id="colA">
        <div class="serveDot"></div>
        <div class="bigScore" id="bigScoreA">0</div>
        <div class="scoreBtns">
          <button class="minusBtn" id="minusA">－</button>
          <button id="plusA">＋</button>
        </div>
      </div>
      <div class="scoreCol" id="colB">
        <div class="serveDot"></div>
        <div class="bigScore" id="bigScoreB">0</div>
        <div class="scoreBtns">
          <button class="minusBtn" id="minusB">－</button>
          <button id="plusB">＋</button>
        </div>
      </div>
    </div>
    <div class="matchControls">
      <button id="btnUndoSet">分數歸零</button>
      <button id="btnResetMatch">重新開始比賽</button>
    </div>
  </div>
</div>

<script>
const setupBox = document.getElementById('setupBox');
const gameArea = document.getElementById('gameArea');
const btnStart = document.getElementById('btnStart');
const btnReset = document.getElementById('btnReset');
const statusText = document.getElementById('statusText');
const cardArea = document.getElementById('cardArea');

const setBlue = document.getElementById('setBlue');
const setRed = document.getElementById('setRed');
const setWhite = document.getElementById('setWhite');
const setupTotal = document.getElementById('setupTotal');
const setInputs = { blue:setBlue, red:setRed, white:setWhite };

function updateSetupTotal() {
  const b = parseInt(setBlue.value) || 0;
  const r = parseInt(setRed.value) || 0;
  const w = parseInt(setWhite.value) || 0;
  setupTotal.textContent = `第一次共抽 ${b + r + w} 張牌`;
  document.querySelectorAll('.stepBtn').forEach(btn => {
    const color = btn.dataset.color;
    const delta = parseInt(btn.dataset.delta);
    const val = parseInt(setInputs[color].value) || 0;
    if (delta > 0) btn.disabled = val >= 6;
    else btn.disabled = val <= 0;
  });
}

document.querySelectorAll('.stepBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    const color = btn.dataset.color;
    const delta = parseInt(btn.dataset.delta);
    const input = setInputs[color];
    const val = Math.max(0, Math.min(6, (parseInt(input.value) || 0) + delta));
    input.value = val;
    updateSetupTotal();
  });
});
updateSetupTotal();

const pickBtns = {
  blue: document.getElementById('pickBlue'),
  red: document.getElementById('pickRed'),
  white: document.getElementById('pickWhite'),
};

const listBlue = document.getElementById('listBlue');
const listRed = document.getElementById('listRed');
const listWhite = document.getElementById('listWhite');
const teamLists = { blue:listBlue, red:listRed, white:listWhite };
const teamHeaders = {
  blue: document.querySelector('.team.blue h3'),
  red: document.querySelector('.team.red h3'),
  white: document.querySelector('.team.white h3'),
};

const teamCounts = { blue:0, red:0, white:0 };
let cards = []; // {el, flipped, color}
let cardCounter = 0;
let round = 0; // 1 or 2
let remainingInRound = { blue:0, red:0, white:0 };
let selectedColor = null;

function updateTeamHeaders() {
  teamHeaders.blue.textContent = `藍隊 (${teamCounts.blue}/6)`;
  teamHeaders.red.textContent = `紅隊 (${teamCounts.red}/6)`;
  teamHeaders.white.textContent = `白隊 (${teamCounts.white}/6)`;
}

function updatePickBar() {
  ['blue','red','white'].forEach(color => {
    const left = remainingInRound[color];
    const label = color === 'blue' ? '藍' : color === 'red' ? '紅' : '白';
    pickBtns[color].textContent = `${label} (剩 ${left})`;
    pickBtns[color].disabled = left <= 0;
    pickBtns[color].classList.toggle('selected', selectedColor === color);
  });
  if (selectedColor && remainingInRound[selectedColor] <= 0) {
    selectedColor = null;
  }
}

function selectColor(color) {
  if (remainingInRound[color] <= 0) return;
  selectedColor = selectedColor === color ? null : color;
  updatePickBar();
  if (selectedColor) {
    const label = selectedColor === 'blue' ? '藍' : selectedColor === 'red' ? '紅' : '白';
    statusText.textContent = `已選擇「${label}」，請點一張牌翻開`;
  } else {
    statusText.textContent = '請先選擇要抽出的顏色';
  }
}

Object.keys(pickBtns).forEach(color => {
  pickBtns[color].addEventListener('click', () => selectColor(color));
});

function makeCards(count) {
  cardArea.innerHTML = '';
  cards = [];
  cardCounter = 0;
  for (let i = 0; i < count; i++) {
    addCard();
  }
}

function addCard() {
  cardCounter++;
  const el = document.createElement('div');
  el.className = 'card';
  el.textContent = cardCounter;
  const idx = cards.length;
  el.addEventListener('click', () => onCardClick(idx));
  cardArea.appendChild(el);
  cards.push({ el, flipped: false, color: null });
}

function pickRandomColor() {
  const available = ['blue','red','white'].filter(c => remainingInRound[c] > 0);
  return available[Math.floor(Math.random() * available.length)];
}

function onCardClick(idx) {
  const c = cards[idx];
  if (c.flipped) return;
  const color = selectedColor || pickRandomColor();
  c.flipped = true;
  c.color = color;
  c.el.classList.add('flipped', color, 'disabled');
  c.el.textContent = color === 'blue' ? '藍' : color === 'red' ? '紅' : '白';

  remainingInRound[color]--;
  teamCounts[color]++;
  updateTeamHeaders();

  const li = document.createElement('li');
  li.textContent = `第 ${idx + 1} 張牌`;
  teamLists[color].appendChild(li);

  selectedColor = null;
  updatePickBar();

  const roundDone = remainingInRound.blue <= 0 && remainingInRound.red <= 0 && remainingInRound.white <= 0;
  if (roundDone) {
    if (round === 1) {
      startRound2();
    } else {
      statusText.textContent = '全部抽籤完成！三隊各 6 人';
    }
  } else {
    statusText.textContent = '請選擇顏色，或直接翻牌隨機抽色';
  }
}

function startRound1() {
  const b = Math.max(0, Math.min(6, parseInt(setBlue.value) || 0));
  const r = Math.max(0, Math.min(6, parseInt(setRed.value) || 0));
  const w = Math.max(0, Math.min(6, parseInt(setWhite.value) || 0));
  remainingInRound = { blue:b, red:r, white:w };
  teamCounts.blue = teamCounts.red = teamCounts.white = 0;
  listBlue.innerHTML = listRed.innerHTML = listWhite.innerHTML = '';
  updateTeamHeaders();
  round = 1;
  const total = b + r + w;
  makeCards(total);
  selectedColor = null;
  updatePickBar();
  if (total === 0) {
    statusText.textContent = '第一次抽籤數量都是 0，直接進入第二次抽籤';
    startRound2();
  } else {
    statusText.textContent = `第一次抽籤：可選顏色指定翻牌，或直接翻牌隨機抽色，共 ${total} 張`;
  }
}

function startRound2() {
  round = 2;
  const b = 6 - teamCounts.blue;
  const r = 6 - teamCounts.red;
  const w = 6 - teamCounts.white;
  remainingInRound = { blue:b, red:r, white:w };
  const total = b + r + w;
  makeCards(total);
  selectedColor = null;
  updatePickBar();
  if (total === 0) {
    statusText.textContent = '全部抽籤完成！三隊各 6 人';
  } else {
    statusText.textContent = `第二次抽籤：只剩 ${total} 張牌要抽，可指定顏色或直接翻牌隨機抽色`;
  }
}

btnStart.addEventListener('click', () => {
  setupBox.classList.add('hidden');
  gameArea.classList.remove('hidden');
  startRound1();
});

btnReset.addEventListener('click', () => {
  gameArea.classList.add('hidden');
  setupBox.classList.remove('hidden');
});

// ---------- 頁面切換 ----------
const navDraft = document.getElementById('navDraft');
const navScore = document.getElementById('navScore');
const draftPage = document.getElementById('draftPage');
const scorePage = document.getElementById('scorePage');

navDraft.addEventListener('click', () => {
  navDraft.classList.add('active');
  navScore.classList.remove('active');
  draftPage.classList.remove('hidden');
  scorePage.classList.add('hidden');
});
navScore.addEventListener('click', () => {
  navScore.classList.add('active');
  navDraft.classList.remove('active');
  scorePage.classList.remove('hidden');
  draftPage.classList.add('hidden');
});

// ---------- 排球記分板 ----------
const bigScoreA = document.getElementById('bigScoreA');
const bigScoreB = document.getElementById('bigScoreB');
const colA = document.getElementById('colA');
const colB = document.getElementById('colB');
const setInfo = document.getElementById('setInfo');
const winnerBanner = document.getElementById('winnerBanner');
const minusA = document.getElementById('minusA');
const minusB = document.getElementById('minusB');
const plusA = document.getElementById('plusA');
const plusB = document.getElementById('plusB');
const btnUndoSet = document.getElementById('btnUndoSet');
const btnResetMatch = document.getElementById('btnResetMatch');
const mode25 = document.getElementById('mode25');
const mode15 = document.getElementById('mode15');

let score = { A:0, B:0 };
let cap = 25;
let serving = null;
let gameOver = false;

function render() {
  bigScoreA.textContent = score.A;
  bigScoreB.textContent = score.B;
  setInfo.textContent = gameOver ? '比賽結束' : `${cap} 分制`;
  colA.classList.toggle('serving', serving === 'A');
  colB.classList.toggle('serving', serving === 'B');
}

function setMode(newCap) {
  if (gameOver === false && score.A === 0 && score.B === 0) {
    cap = newCap;
    mode25.classList.toggle('active', cap === 25);
    mode15.classList.toggle('active', cap === 15);
    render();
  }
}
mode25.addEventListener('click', () => setMode(25));
mode15.addEventListener('click', () => setMode(15));

function addPoint(team) {
  if (gameOver) return;
  score[team]++;
  serving = team;
  checkGameWin();
  render();
}

function minusPoint(team) {
  if (gameOver) return;
  if (score[team] > 0) score[team]--;
  render();
}

function checkGameWin() {
  const a = score.A, b = score.B;
  if ((a >= cap || b >= cap) && Math.abs(a - b) >= 2) {
    const winner = a > b ? 'A' : 'B';
    gameOver = true;
    winnerBanner.textContent = winner === 'A' ? '🏆 左方獲勝！' : '🏆 右方獲勝！';
    winnerBanner.classList.remove('hidden');
  }
}

plusA.addEventListener('click', () => addPoint('A'));
plusB.addEventListener('click', () => addPoint('B'));
minusA.addEventListener('click', () => minusPoint('A'));
minusB.addEventListener('click', () => minusPoint('B'));

btnUndoSet.addEventListener('click', () => {
  score = { A:0, B:0 };
  gameOver = false;
  winnerBanner.classList.add('hidden');
  render();
});

btnResetMatch.addEventListener('click', () => {
  score = { A:0, B:0 };
  serving = null;
  gameOver = false;
  winnerBanner.classList.add('hidden');
  render();
});

render();
</script>
</body>
</html>
